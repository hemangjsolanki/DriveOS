name: DriveOS
options:
  bundleIdPrefix: com.hemang.driveos
  deploymentTarget:
    iOS: "17.0"
packages:
  IQKeyboardManager:
    url: https://github.com/hackiftekhar/IQKeyboardManager
    from: 7.1.1

targets:
  DriveOS:
    type: application
    platform: iOS
    sources: [DriveOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hemang.driveos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: 5.9
    dependencies:
      - target: DriveOSWidget
        embed: true
      - package: IQKeyboardManager
        product: IQKeyboardManagerSwift

  DriveOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - DriveOSWidget
      - path: DriveOS/Features/Charging/ChargingAttributes.swift
    info:
      path: DriveOSWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hemang.driveos.DriveOSWidget
        SWIFT_VERSION: 5.9
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: ""
